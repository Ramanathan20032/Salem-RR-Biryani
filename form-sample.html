<form action="send.php" method="post">
  <div class="row g-3">
    <div class="col-md-6">
      <div class="form-floating">
        <input
          type="text"
          class="form-control"
          id="name"
          name="name"
          placeholder="Your Name"
          required
        />
        <label for="name">Your Name</label>
      </div>
    </div>
    <div class="col-md-6">
      <div class="form-floating">
        <input
          type="email"
          class="form-control"
          id="email"
          name="email"
          placeholder="Your Email"
          required
        />
        <label for="email">Your Email</label>
      </div>
    </div>
    <!-- Phone Number with Country Code -->
    <div class="col-md-12">
      <div class="row">
        <div class="col-4">
          <div class="form-floating">
            <select
              class="form-select pt-1"
              id="phoneCode"
              name="phoneCode"
              required
            >
              <option value="+60">+91</option>
              <option value="+1">+81</option>
              <option value="+44">+44</option>
              <option value="+91">+60</option>
              <option value="+65">+65</option>
            </select>
            <!-- <label for="phoneCode">Phone Code</label> -->
          </div>
        </div>

        <div class="col-8">
          <div class="form-floating">
            <input
              type="tel"
              class="form-control"
              id="phone"
              name="phone"
              placeholder="Your Phone Number"
              required
              pattern="^\d{10,15}$"
              title="Phone number should be 10 to 15 digits long"
            />
            <label for="phone">Phone Number</label>
          </div>
        </div>
      </div>
    </div>

    <div class="col-12">
      <div class="form-floating">
        <input
          type="text"
          class="form-control"
          id="subject"
          name="subject"
          placeholder="Subject"
        />
        <label for="subject">Subject</label>
      </div>
    </div>
    <div class="col-12">
      <div class="form-floating">
        <textarea
          class="form-control textarea-height"
          placeholder="Leave a message here"
          name="message"
          id="message"
        ></textarea>
        <label for="message">Message</label>
      </div>
    </div>
    <div class="col-12">
      <button
        type="submit"
        id="mySubmitBtn"
        disabled
        class="btn btn-primary py-3 px-4 br-4"
      >
        Send Message
      </button>
    </div>
  </div>
</form>
<script>
  document.querySelector("form").addEventListener("submit", function (e) {
    // Get form elements
    const name = document.getElementById("name").value.trim();
    const email = document.getElementById("email").value.trim();
    const phone = document.getElementById("phone").value.trim();
    const phoneCode = document.getElementById("phoneCode").value;
    const subject = document.getElementById("subject").value.trim();
    const message = document.getElementById("message").value.trim();

    // Patterns for phone and email validation
    const phonePattern = /^\d{10,15}$/;
    const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

    // Check required fields
    if (!name || !email || !phone || !subject || !message) {
      alert("Please fill out all required fields.");
      e.preventDefault();
      return;
    }

    // Check phone number
    if (!phonePattern.test(phone)) {
      alert("Please enter a valid phone number between 10 and 15 digits.");
      e.preventDefault();
      return;
    }

    // Check email format
    if (!emailPattern.test(email)) {
      alert("Please enter a valid email address.");
      e.preventDefault();
      return;
    }

    const fullPhoneNumber = phoneCode + phone;
    console.log("Full Phone Number: " + fullPhoneNumber);
  });
</script>
